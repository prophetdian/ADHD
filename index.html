<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ADHD LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000000;
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    height: 100%;
    overflow-x: hidden;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 20% 20%, rgba(0,247,255,0.10), transparent 45%),
      radial-gradient(circle at 80% 75%, rgba(250,0,255,0.10), transparent 45%);
    z-index: 0;
  }
  h1 {
    font-weight: 700;
    font-size: clamp(2.5rem, 8vw, 5rem);
    margin: 0 0 0.25rem 0;
    letter-spacing: 2px;
    text-align: center;
    background: linear-gradient(90deg, #00F7FF, #FA00FF);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(0,247,255,0.25);
    z-index: 1;
  }
  p.subtitle {
    color: #888;
    font-size: 1rem;
    margin: 0 0 3rem 0;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 1;
  }
  .lab-grid {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 1;
    padding: 0 1.5rem;
  }
  .lab-card {
    width: 260px;
    padding: 2rem 1.5rem;
    background: #0a0a0a;
    border: 2px solid #00F7FF;
    border-radius: 20px;
    text-decoration: none;
    color: #fff;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    box-shadow: 0 0 25px rgba(0,247,255,0.15);
  }
  .lab-card:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: #FA00FF;
    box-shadow: 0 0 40px rgba(250,0,255,0.35);
  }
  .lab-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 0.75rem;
    filter: drop-shadow(0 0 10px #00F7FF);
  }
  .lab-card h2 {
    margin: 0 0 0.4rem 0;
    font-size: 1.3rem;
    font-weight: 600;
  }
  .lab-card p {
    margin: 0;
    font-size: 0.85rem;
    color: #999;
  }
  footer {
    margin-top: 3rem;
    color: #444;
    font-size: 0.75rem;
    letter-spacing: 2px;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <h1>ADHD LAB</h1>
  <p class="subtitle">Focus &middot; Reflex &middot; Flow</p>

  <div class="lab-grid">
    <a class="lab-card" href="speed-boxing.html">
      <span class="lab-icon">🥊</span>
      <h2>Speed Boxing</h2>
      <p>Punch the bag. Chase the rhythm.</p>
    </a>
  </div>

  <footer>MORE EXERCISES COMING SOON</footer>
</body>
</html>
